<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Peta Zona Hunian Jabodetabekpunjur</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <!-- Plugin Heatmap -->
  <script src="https://unpkg.com/leaflet.heat/dist/leaflet-heat.js"></script>
  <!-- Plugin MarkerCluster -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.Default.css" />
  <script src="https://unpkg.com/leaflet.markercluster/dist/leaflet.markercluster.js"></script>
  <style>
    #map { height: 600px; }
  </style>
</head>
<body>
  <h3>Peta Zona Hunian & Kerentanan</h3>
  <div id="map"></div>

  <script>
    var map = L.map('map').setView([-6.2, 106.8], 10);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '© OpenStreetMap contributors'
    }).addTo(map);

    var dataPoints = [
      {wilayah:"Jakarta Utara", kec:"Penjaringan (Muara Baru)", lat:-6.1033, lng:106.8011, zona:"Zona Kerentanan", nilai:1, desk:"Padat, rawan banjir rob, butuh T1"},
      {wilayah:"Jakarta Pusat", kec:"Johar Baru", lat:-6.1852, lng:106.8554, zona:"Zona Kerentanan", nilai:1, desk:"Kepadatan tertinggi, butuh T1"},
      {wilayah:"Jakarta Barat", kec:"Tambora", lat:-6.1491, lng:106.8037, zona:"Zona Kerentanan", nilai:1, desk:"Kantong kemiskinan urban, butuh T1"},
      {wilayah:"Bekasi", kec:"Tambun Selatan", lat:-6.2625, lng:107.0390, zona:"Zona Sprawl", nilai:2, desk:"Urban sprawl, commuter jauh, butuh T2"},
      {wilayah:"Tangerang Selatan", kec:"Pamulang", lat:-6.3429, lng:106.7381, zona:"Zona Sprawl", nilai:2, desk:"Sabuk komuter, ketergantungan mobil, butuh T2"},
      {wilayah:"Depok", kec:"Sawangan", lat:-6.4022, lng:106.7565, zona:"Zona Sprawl", nilai:2, desk:"Ekspansi lahan tidak terkendali, butuh T2"},
      {wilayah:"Jakarta Pusat", kec:"Dukuh Atas (Sudirman)", lat:-6.2017, lng:106.8227, zona:"Zona Isolasi", nilai:3, desk:"Pusat konektivitas (MRT/LRT), butuh T3"},
      {wilayah:"Jakarta Selatan", kec:"Lebak Bulus", lat:-6.2844, lng:106.7744, zona:"Zona Isolasi", nilai:3, desk:"Hub transportasi selatan, butuh T3"},
      {wilayah:"Jakarta Pusat", kec:"Tomang / Cideng", lat:-6.1770, lng:106.8070, zona:"Zona Isolasi", nilai:3, desk:"Area ruko/kantor untuk densifikasi, butuh T3"},
      {wilayah:"Bogor", kec:"Cisarua (Puncak)", lat:-6.6946, lng:106.9404, zona:"Zona Ekologis", nilai:4, desk:"Daerah tangkapan air, alih fungsi lahan, butuh T4"},
      {wilayah:"Jakarta Utara", kec:"Marunda / Cilincing", lat:-6.1075, lng:106.9602, zona:"Zona Ekologis", nilai:4, desk:"Pesisir kritis, adaptasi iklim, butuh T4"},
      {wilayah:"Cianjur", kec:"Cipanas", lat:-6.7410, lng:107.0425, zona:"Zona Ekologis", nilai:4, desk:"Batas aglomerasi, konservasi air, butuh T4"}
    ];

    function getColor(zona) {
      switch(zona) {
        case "Zona Kerentanan": return "red";
        case "Zona Sprawl": return "orange";
        case "Zona Isolasi": return "blue";
        case "Zona Ekologis": return "green";
        default: return "gray";
      }
    }

    // Cluster Marker
    var markers = L.markerClusterGroup();
    dataPoints.forEach(point => {
      var marker = L.circleMarker([point.lat, point.lng], {
        color: getColor(point.zona),
        radius: 8,
        fillOpacity: 0.7
      }).bindPopup("<b>" + point.wilayah + " - " + point.kec + "</b><br/>" +
                   point.zona + " (Nilai: " + point.nilai + ")<br/>" +
                   point.desk);
      markers.addLayer(marker);
    });
    map.addLayer(markers);

    // Heatmap Layer
    var heatData = dataPoints.map(p => [p.lat, p.lng, p.nilai]);
    L.heatLayer(heatData, {radius: 25, blur: 15, maxZoom: 17}).addTo(map);

    // Contoh GeoJSON (dummy polygon)
    var geojsonFeature = {
      "type": "Feature",
      "properties": {"name": "Contoh Area"},
      "geometry": {
        "type": "Polygon",
        "coordinates": [[[106.75,-6.3],[106.85,-6.3],[106.85,-6.2],[106.75,-6.2],[106.75,-6.3]]]
      }
    };
    L.geoJSON(geojsonFeature, {
      style: {color: "purple", weight: 2, fillOpacity: 0.1}
    }).addTo(map);
  </script>
</body>
</html>
